# Application Configuration
spring.application.name=Memory Efficient File Deduplication System

# Server Configuration
server.port=8080

# Disable MongoDB auto-configuration (using in-memory storage)
spring.data.mongodb.uri=mongodb://localhost:27017/dummy
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration

# File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongForHS256Algorithm
jwt.expiration=86400000

# Logging Configuration
logging.level.root=INFO
logging.level.com.dedup.deduplication=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Bloom Filter Configuration
bloom.filter.expected.insertions=1000000
bloom.filter.false.positive.rate=0.01

# Cloud Sync Configuration
cloud.sync.auto.enabled=true
cloud.sync.auto.interval=300000
cloud.sync.success.rate=0.95

# Async Configuration
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
